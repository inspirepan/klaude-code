# Built-in provider and model configurations
# Users can start using klaude by simply setting environment variables
# (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.) without manual configuration.
provider_list:

# ######################################## anthropic ########################################
- provider_name: anthropic
  protocol: anthropic
  api_key: ${ANTHROPIC_API_KEY}
  model_list:

  - &sonnet
    model_name: sonnet
    model_id: claude-sonnet-4-6
    context_limit: 1000000
    thinking:
      type: adaptive
    cost: { input: 3, output: 15, cache_read: 0.3, cache_write: 3.75 }

  - model_name: sonnet:no-thinking
    model_id: claude-sonnet-4-6
    context_limit: 1000000
    cost: { input: 3, output: 15, cache_read: 0.3, cache_write: 3.75 }

  - &opus
    model_name: opus
    model_id: claude-opus-4-7
    max_tokens: 64000
    context_limit: 1000000
    effort: high
    thinking:
      type: adaptive
    cost: { input: 5, output: 25, cache_read: 0.5, cache_write: 6.25 }

  - &opus_xhigh
    model_name: opus:xhigh
    model_id: claude-opus-4-7
    max_tokens: 64000
    context_limit: 1000000
    effort: xhigh
    thinking:
      type: adaptive
    cost: { input: 5, output: 25, cache_read: 0.5, cache_write: 6.25 }

  - model_name: opus:fast
    model_id: claude-opus-4-7
    max_tokens: 64000
    context_limit: 1000000
    effort: high
    fast_mode: true
    thinking:
      type: adaptive
    cost: { input: 30, output: 150, cache_read: 3, cache_write: 37.5 }

  - &haiku
    model_name: haiku
    model_id: claude-haiku-4-5
    context_limit: 200000
    cost: { input: 1, output: 5, cache_read: 0.1, cache_write: 1.25 }
# ######################################## aws-bedrock ########################################
- provider_name: aws-bedrock
  protocol: bedrock
  aws_access_key: ${AWS_BEDROCK_ACCESS_KEY_ID}
  aws_secret_key: ${AWS_BEDROCK_SECRET_ACCESS_KEY}
  aws_region: ${AWS_BEDROCK_REGION}
  model_list:

  - model_name: sonnet
    model_id: global.anthropic.claude-sonnet-4-6
    context_limit: 1000000
    thinking:
      type: adaptive
    cost: { input: 3, output: 15, cache_read: 0.3, cache_write: 3.75 }

  - model_name: sonnet:no-thinking
    model_id: global.anthropic.claude-sonnet-4-6
    context_limit: 1000000
    cost: { input: 3, output: 15, cache_read: 0.3, cache_write: 3.75 }

  - model_name: opus
    model_id: global.anthropic.claude-opus-4-7
    max_tokens: 64000
    context_limit: 1000000
    effort: high
    thinking:
      type: adaptive
    cost: { input: 5, output: 25, cache_read: 0.5, cache_write: 6.25 }

  - model_name: opus:xhigh
    model_id: global.anthropic.claude-opus-4-7
    max_tokens: 64000
    context_limit: 1000000
    effort: xhigh
    thinking:
      type: adaptive
    cost: { input: 5, output: 25, cache_read: 0.5, cache_write: 6.25 }

  - model_name: opus-4-6
    model_id: global.anthropic.claude-opus-4-6-v1
    context_limit: 1000000
    effort: high
    thinking:
      type: adaptive
    cost: { input: 5, output: 25, cache_read: 0.5, cache_write: 6.25 }

  - model_name: haiku
    model_id: global.anthropic.claude-haiku-4-5-20251001-v1:0
    context_limit: 200000
    cost: { input: 1, output: 5, cache_read: 0.1, cache_write: 1.25 }

# ######################################## openai ########################################
- provider_name: openai
  protocol: responses
  api_key: ${OPENAI_API_KEY}
  model_list:

  - &gpt54nano
    model_name: gpt-5.4-nano
    model_id: gpt-5.4-nano
    max_tokens: 128000
    context_limit: 400000
    verbosity: low
    thinking:
      reasoning_effort: none
      reasoning_summary: concise
    cost: { input: 0.2, output: 1.25, cache_read: 0.02 }

  - &gpt54mini
    model_name: gpt-5.4-mini
    model_id: gpt-5.4-mini
    max_tokens: 128000
    context_limit: 400000
    verbosity: low
    thinking:
      reasoning_effort: none
      reasoning_summary: concise
    cost: { input: 0.75, output: 4.5, cache_read: 0.075 }

  - model_name: gpt-5.4-mini:fast
    model_id: gpt-5.4-mini
    max_tokens: 128000
    context_limit: 400000
    verbosity: low
    fast_mode: true
    thinking:
      reasoning_effort: none
      reasoning_summary: concise
    cost: { input: 1.5, output: 9, cache_read: 0.15 }

  - &gpt54
    model_name: gpt-5.4
    model_id: gpt-5.4
    max_tokens: 128000
    context_limit: 400000
    verbosity: low
    thinking:
      reasoning_effort: high
      reasoning_summary: concise
    cost: { input: 2.5, output: 15, cache_read: 0.25 }

  - &gpt54_xhigh
    model_name: gpt-5.4:xhigh
    model_id: gpt-5.4
    max_tokens: 128000
    context_limit: 400000
    verbosity: low
    thinking:
      reasoning_effort: xhigh
      reasoning_summary: concise
    cost: { input: 2.5, output: 15, cache_read: 0.25 }

  - model_name: gpt-5.4:fast
    model_id: gpt-5.4
    max_tokens: 128000
    context_limit: 400000
    verbosity: low
    fast_mode: true
    thinking:
      reasoning_effort: high
      reasoning_summary: concise
    cost: { input: 5, output: 30, cache_read: 0.5 }

  - model_name: gpt-5.4:xhigh:fast
    model_id: gpt-5.4
    max_tokens: 128000
    context_limit: 400000
    verbosity: low
    fast_mode: true
    thinking:
      reasoning_effort: xhigh
      reasoning_summary: concise
    cost: { input: 5, output: 30, cache_read: 0.5 }

  - &gpt53codex
    model_id: gpt-5.3-codex
    thinking:
      reasoning_effort: high
      reasoning_summary: auto
    context_limit: 400000
    max_tokens: 128000
    cost: { input: 1.75, output: 14, cache_read: 0.17 }

  - &gpt53codex_xhigh
    model_name: gpt-5.3-codex:xhigh
    model_id: gpt-5.3-codex
    thinking:
      reasoning_effort: xhigh
      reasoning_summary: auto
    context_limit: 400000
    max_tokens: 128000
    cost: { input: 1.75, output: 14, cache_read: 0.17 }

# ######################################## google ########################################
- provider_name: google
  protocol: google
  api_key: ${GOOGLE_API_KEY|GEMINI_API_KEY}
  model_list:

  - model_name: gemini-pro
    model_id: gemini-pro-latest
    context_limit: 1048576
    thinking:
      reasoning_effort: high
    cost: { input: 2, output: 12, cache_read: 0.2 }

  - model_name: gemini-flash
    model_id: gemini-flash-latest
    context_limit: 1048576
    thinking:
      reasoning_effort: medium
    cost: { input: 0.5, output: 3, cache_read: 0.05 }

  - &gemini_flash_minimal
    model_name: gemini-flash:minimal
    model_id: gemini-flash-latest
    context_limit: 1048576
    thinking:
      reasoning_effort: minimal
    cost: { input: 0.5, output: 3, cache_read: 0.05 }

  - &gemini_flash_lite
    model_name: gemini-flash-lite
    model_id: gemini-3.1-flash-lite-preview
    context_limit: 1048576
    thinking:
      reasoning_effort: minimal
    cost: { input: 0.25, output: 1.5, cache_read: 0.02 }

# ######################################## google-vertex ########################################
- provider_name: google-vertex
  protocol: google_vertex
  google_application_credentials: ${GOOGLE_APPLICATION_CREDENTIALS}
  google_cloud_project: ${GOOGLE_CLOUD_PROJECT}
  google_cloud_location: ${GOOGLE_CLOUD_LOCATION}
  model_list:

  - model_name: gemini-pro
    model_id: gemini-3.1-pro-preview
    context_limit: 1048576
    thinking:
      reasoning_effort: high
    cost: { input: 2, output: 12, cache_read: 0.2 }

  - model_name: gemini-flash
    model_id: gemini-3-flash-preview
    context_limit: 1048576
    thinking:
      reasoning_effort: medium
    cost: { input: 0.5, output: 3, cache_read: 0.05 }

  - *gemini_flash_minimal

  - *gemini_flash_lite

# ######################################## deepseek ########################################
- provider_name: deepseek
  protocol: anthropic
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/anthropic
  model_list:

  - model_name: deepseek
    model_id: deepseek-reasoner
    context_limit: 128000
    thinking:
      type: enabled
      budget_tokens: 2048
    cost: { input: 2, output: 3, cache_read: 0.2, currency: CNY }

# ######################################## moonshot ########################################
- provider_name: moonshot
  protocol: anthropic
  api_key: ${MOONSHOT_API_KEY}
  base_url: https://api.moonshot.cn/anthropic
  model_list:

  - model_name: kimi
    model_id: kimi-k2.5
    context_limit: 262144
    thinking:
      type: enabled
      budget_tokens: 8192
    cost: { input: 4, output: 21, cache_read: 0.7, currency: CNY }

# ######################################## minimax ########################################
- provider_name: minimax
  protocol: anthropic
  api_key: ${MINIMAX_API_KEY}
  base_url: https://api.minimax.io/anthropic
  model_list:

  - model_name: m2.7
    model_id: MiniMax-M2.7
    context_limit: 204800
    thinking:
      type: enabled
      budget_tokens: 8192
    cost: { input: 0.3, output: 1.2, cache_read: 0.06, cache_write: 0.375 }

  - model_name: m2.7:highspeed
    model_id: MiniMax-M2.7-highspeed
    context_limit: 204800
    thinking:
      type: enabled
      budget_tokens: 8192
    cost: { input: 0.6, output: 2.4, cache_read: 0.06, cache_write: 0.375 }

# ######################################## cerebras ########################################
- provider_name: cerebras
  protocol: openai
  api_key: ${CEREBRAS_API_KEY}
  base_url: https://api.cerebras.ai/v1
  model_list:

  - model_name: glm
    model_id: zai-glm-4.7
    context_limit: 131072
    max_tokens: 12800
    cost: { input: 2.25, output: 2.75 }

# ######################################## codex ########################################
- provider_name: codex
  protocol: codex_oauth
  model_list:

  - *gpt53codex
  - *gpt53codex_xhigh
  - *gpt54nano
  - *gpt54mini
  - *gpt54
  - *gpt54_xhigh

# ######################################## github-copilot ########################################
- provider_name: github-copilot
  protocol: github_copilot_oauth
  model_list:

  - *gpt53codex
  - *gpt53codex_xhigh
  - *gpt54nano
  - *gpt54mini
  - *gpt54
  - *gpt54_xhigh

  - *sonnet
  - *haiku
  - *opus

# ######################################## ark-coding-plan ########################################
- provider_name: ark-coding-plan
  protocol: anthropic
  api_key: ${ARK_API_KEY}
  base_url: https://ark.cn-beijing.volces.com/api/coding/
  model_list:

  - model_name: seed-code
    model_id: doubao-seed-2.0-code
    context_limit: 256000
    cost: { input: 4.8, output: 24, cache_read: 0.96, currency: CNY }
    thinking:
      type: enabled
      budget_tokens: 8192

# ######################################## openrouter ########################################
- provider_name: openrouter
  protocol: openrouter
  api_key: ${OPENROUTER_API_KEY}
  model_list:

  - model_name: gpt-5.3-codex
