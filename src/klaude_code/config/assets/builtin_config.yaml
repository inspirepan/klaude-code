# Built-in provider and model configurations
# Users can start using klaude by simply setting environment variables
# (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.) without manual configuration.
provider_list:

# ######################################## youtu-anthropic ########################################
- provider_name: youtu-anthropic
  protocol: anthropic
  api_key: ${YOUTU_API_KEY}
  base_url: https://api.youtu.uk/anthropic
  model_list:

  - model_name: fable
    model_alias: [ claude-fable-5 ]
    model_id: claude-fable-5
    max_tokens: 128000
    context_limit: 1000000
    effort: high
    thinking:
      type: adaptive
    cost: { input: 10, output: 50, cache_read: 1, cache_write: 12.5 }

  - model_name: fable:xhigh
    model_alias: [ claude-fable-5:xhigh ]
    model_id: claude-fable-5
    max_tokens: 128000
    context_limit: 1000000
    effort: xhigh
    thinking:
      type: adaptive
    cost: { input: 10, output: 50, cache_read: 1, cache_write: 12.5 }

  - model_name: sonnet
    model_alias: [ sonnet-5, sonnet5, claude-sonnet-5 ]
    model_id: claude-sonnet-5
    context_limit: 1000000
    effort: medium
    thinking:
      type: adaptive
    cost: { input: 3, output: 15, cache_read: 0.3, cache_write: 3.75 }

  - model_name: sonnet:low
    model_alias: [ sonnet-5:low, sonnet5:low, claude-sonnet-5:low ]
    model_id: claude-sonnet-5
    context_limit: 1000000
    effort: low
    thinking:
      type: adaptive
    cost: { input: 3, output: 15, cache_read: 0.3, cache_write: 3.75 }

  - model_name: opus
    model_alias: [ opus-4-7, claude-opus-4-7 ]
    model_id: claude-opus-4-7
    max_tokens: 128000
    context_limit: 1000000
    effort: high
    thinking:
      type: adaptive
    cost: { input: 5, output: 25, cache_read: 0.5, cache_write: 6.25 }

  - model_name: opus:xhigh
    model_alias: [ opus-4-7:xhigh, claude-opus-4-7:xhigh ]
    model_id: claude-opus-4-7
    max_tokens: 128000
    context_limit: 1000000
    effort: xhigh
    thinking:
      type: adaptive
    cost: { input: 5, output: 25, cache_read: 0.5, cache_write: 6.25 }

  - model_name: haiku
    model_alias: [ claude-haiku-4-5, claude-haiku-4-5-20251001 ]
    model_id: claude-haiku-4-5
    context_limit: 200000
    cost: { input: 1, output: 5, cache_read: 0.1, cache_write: 1.25 }

  - model_name: kimi
    model_alias: [ k3, kimi-k3 ]
    model_id: kimi-k3
    max_tokens: 131072
    context_limit: 1048576
    effort: max
    cost: { input: 3, output: 15, cache_read: 0.3 }

  - model_name: kimi:code
    model_alias: [ k2.7-code, kimi-k2.7-code, kimi-k2.7, kimi-k2-7-code ]
    model_id: kimi-k2.7-code
    context_limit: 262144
    thinking:
      type: enabled
      budget_tokens: 8192
    cost: { input: 0.95, output: 4, cache_read: 0.19 }

  - model_name: kimi:fast
    model_alias: [ k2.7-code-highspeed, kimi-k2.7-code-highspeed, kimi-k2.7-highspeed, kimi-k2-7-code-highspeed ]
    model_id: kimi-k2.7-code-highspeed
    context_limit: 262144
    thinking:
      type: enabled
      budget_tokens: 8192
    cost: { input: 1.9, output: 8, cache_read: 0.38 }

