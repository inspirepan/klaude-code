    thinking:
      reasoning_effort: xhigh
      reasoning_summary: auto
    context_limit: 400000
    max_tokens: 128000
    cost: { input: 1.75, output: 14, cache_read: 0.17 }

  - model_name: gpt-5.4-nano
    model_id: openai/gpt-5.4-nano
    max_tokens: 128000
    context_limit: 400000
    verbosity: low
    thinking:
      reasoning_effort: none
