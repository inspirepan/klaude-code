sub_agent_models:
  finder:
  - gpt-5.4-mini
  - gemini-flash:minimal
  - haiku
  code-reviewer:
  - gpt-5.4
  - opus

compact_model:
- gemini-flash
- sonnet:no-thinking
- gpt-5.4-mini
fast_model:
- gpt-5.4-nano
- gemini-flash-lite
- gpt-5.4-mini
- gemini-flash:minimal
- haiku
