name: PR Checks

on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/pr-checks.yml'

      - name: Verify submodule checkout
        run: |
          git submodule status --recursive
          test -f src/klaude_code/skill/assets/web-search/SKILL.md

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node.js
        if: steps.changes.outputs.web == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        if: steps.changes.outputs.web == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install web dependencies
        if: steps.changes.outputs.web == 'true'
        run: cd web && pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --frozen --dev

      - name: Python lint
        run: make ruff-check typecheck imports

      - name: Web lint
        if: steps.changes.outputs.web == 'true'
        run: make web-lint

      - name: Python format
        run: |
          uv run ruff check --fix .
          uv run ruff format .

      - name: Web format
        if: steps.changes.outputs.web == 'true'
        run: make web-format

      - name: Verify formatting changes committed
        run: git diff --exit-code

      - name: Python test
        run: uv run pytest -m "not network"

      - name: Web test
        if: steps.changes.outputs.web == 'true'
        run: make web-test
