name: PR Checks

on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify submodule checkout
        run: |
          git submodule status --recursive
          test -f src/klaude_code/skill/assets/web-search/SKILL.md

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: make lint

      - name: Format
        run: make format

      - name: Verify formatting changes committed
        run: git diff --exit-code

      - name: Test
        run: make test